# Session Record Template
# Copy as session-NNN.yaml at the START of each session.
# Fill in as work progresses. Do not wait until the end.

session: 0                    # Replace with actual session number
date: "YYYY-MM-DD"           # Replace with actual date
type: "build"                 # build | verify | plan | investigate

