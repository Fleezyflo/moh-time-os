gaps_found:
  - "DigestEngine generate_digest/get_pending_count use raw SQL via store.query() -- no store CRUD equivalent for complex SELECTs. Separate refactor."
  - "NotificationEngine muting/analytics tests use Mock store -- should be converted to fixture DB for same reasons as digest tests. Separate PR."

lessons:
  - "Constructor side-effects (_ensure_tables) survived the DI refactor because nobody checked whether the work was already done elsewhere. Schema ownership must live in exactly one place."
  - "store.query() for UPDATE SQL bypasses _write_lock -- any write must go through store.insert/update/delete. This is a concurrency bug, not a style issue."
  - "Test fixture INSERT INTO vs production INSERT OR REPLACE is a semantic mismatch that tests can't catch because no test triggers duplicate keys. Latent bugs survive when fixtures diverge from production."
  - "Deferred imports inside function bodies are justified only for circular dependency breaking or graceful degradation (try/except). Lazy stdlib imports (os, shutil, timedelta) are unjustified clutter."
  - "Session-scoped test DB fixtures create shared mutable state across tests. Function-scoped tmp_path isolates each test."
