lessons:
  - "Mock tests at persistence boundaries hide schema-code mismatches. mute_entity() inserted muted_at (column doesn't exist) and omitted entity_type (NOT NULL). 4 production bugs survived because Mock never touched the real schema."
  - "The fixture DB conversion pattern is: _FixtureStore class + create_fixture_db() + function-scoped tmp_path. This is now the canonical test pattern for any code that writes to the database."
  - "safe_sql.select() supports GROUP BY via the suffix= parameter. This eliminates the need for raw SQL strings in queries that use GROUP BY."
