  - id: "task-01"
    name: "Verify brand_id population"
    status: "DONE"
    findings: |
      brand_id exists and is correctly wired across the data model:

      Schema (lib/schema.py):
        - brands table: id (PK), client_id (FK→clients), name. §12 Core.
        - projects.brand_id: TEXT column at line 92.
        - tasks.brand_id: TEXT column at line 157.
        - invoices.brand_id: TEXT column at line 339.
        - signals.brand_id: TEXT column at line 509.
        - signals_v29.brand_id: TEXT column at line 582.

      Population chain:
        1. entity_linker.py — seeds brands from BRAND_TO_CLIENT mapping (16 brands),
           creates brands table rows, links projects→brands via extract_brand_from_name().
        2. seed_brands.py — migration creates brands from project names for non-internal
           projects without brand_id. Links projects to those brands.
        3. normalizer.py _normalize_tasks() — derives tasks.brand_id from
           projects.brand_id via LEFT JOIN chain (tasks→projects→brands→clients).
           Sets project_link_status and client_link_status accordingly.

      Gate enforcement (lib/gates.py):
        - project_brand_required: COUNT(*) WHERE is_internal=0 AND brand_id IS NULL = 0.
        - project_brand_consistency: projects.client_id must match brands.client_id.
        - Both are BLOCKING gates — if they fail, truth modules are skipped.

      Verdict: brand_id is defined, populated via 3 mechanisms, and enforced via 2 blocking gates.

  - id: "task-02"
    name: "Verify from_domain derivation"
    status: "DONE"
    findings: |
      from_domain derivation is correctly implemented in normalizer.py:

      Schema: communications.from_domain (TEXT), communications.from_email (TEXT).

      Derivation logic (normalizer.py _normalize_communications() line 241-248):
        SQL: LOWER(SUBSTR(from_email, INSTR(from_email, '@') + 1))
        Conditions: from_email IS NOT NULL, from_email LIKE '%@%',
                    from_domain IS NULL OR from_domain = ''.

      Edge cases handled:
        - NULL from_email: skipped (WHERE from_email IS NOT NULL).
        - No '@' in email: skipped (WHERE from_email LIKE '%@%').
        - Already populated: skipped (WHERE from_domain IS NULL OR from_domain = '').
        - Case: LOWER() applied for consistent matching.

      Client linking via from_domain (lines 252-268):
        - Matches via client_identities table (identity_type='domain').
        - Falls back to email match (identity_type='email').
        - Additional fallback: subject line matching client names (min 4 chars).
        - Additional fallback: invoice client name matching in subject.

      Pipeline position: runs in autonomous_loop Phase 1a2 (DATA NORMALIZATION),
      after collect, before truth modules. Consistent with MASTER_SPEC §4.

      Verdict: from_domain correctly extracted from from_email with all edge cases handled.

