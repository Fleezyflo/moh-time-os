    gaps:
      - id: "GAP-07-01"
        severity: "medium"
        description: |
          engagements table is NOT in lib/schema.py (the single source of truth).
          It is only created by the v29_engagement_lifecycle.py migration.
          The schema.py docstring says "Every table, column, index, and data migration
          for MOH TIME OS lives here. Nothing else defines schema." This means the
          engagements table exists outside the declarative schema system and would not
          be auto-converged by the schema_engine. The engagement_transitions table is
          also missing from schema.py.
        fix: |
          Add TABLES["engagements"] and TABLES["engagement_transitions"] definitions
          to lib/schema.py matching the v29 migration CREATE TABLE statements.
          Then bump SCHEMA_VERSION. This does not require code changes to any other
          module — it brings the table under the schema engine's convergence system.

