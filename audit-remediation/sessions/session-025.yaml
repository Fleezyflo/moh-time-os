lessons:
  - "The daemon runs code from the MAIN CHECKOUT working dir, not the worktree. A worktree-only (or even merged-to-main) fix is not 'live' for the daemon until the main checkout itself is moved onto main. Always check what working dir a launchctl plist's ProgramArguments points at before claiming a fix is deployed."
  - "Window i's boundaries in client_trajectory/person_trajectory depend only on i, window_size_days, and build-time now -- NOT on num_windows. So the most-recent k windows of an N-window trajectory equal a fresh k-window trajectory. One max-window (6) bulk build serves every signal's smaller request (k in 3/4/6) via a slice + trend recompute."
  - "Person trajectory metrics are name-based (LOWER(assignee)=person_name), and that mapping is many-to-one: two person_ids with the same name get identical counts in the per-entity path. A bulk path keyed name->single-id (last writer wins) silently zeros all but one -- caught by full-population equivalence testing (the 'Dana Oraibi' collision), not by spot-checks. Bulk rewrites of per-entity logic must be proven equivalent across the ENTIRE population, not a sample."
  - "DONE_OK is not a literal in the codebase -- it is shorthand for 'the autonomous-loop Phase 1f (full-mode detect_all_signals) completes successfully and fast' rather than hanging. The operational test is: detect_all_signals(quick=False) returns success=True with 0 errors in < ~120s on a live-DB copy."
