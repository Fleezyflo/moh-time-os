  - id: "task-03"
    name: "Verify 24h unattended operation"
    status: "DONE with 3 GAPs"
    findings: |
      Crash recovery (lib/daemon.py):
        - SIGTERM/SIGINT handlers via signal.signal() → sets _shutdown_event (threading.Event)
        - Cooperative shutdown: run_cycle() checks _shutdown_event before each job
        - PID file management: write on start, remove on shutdown
        - State persistence: daemon_state.json saves job states, last run times, failure counts
        - On restart: loads state from JSON, resumes from where it left off
        - Exponential backoff: per-job failure tracking, backs off on repeated failures (max_retries=3)
        - Circuit breakers: per-job (failure_threshold=5, cooldown_seconds=600)

      Sleep/wake detection:
        - daemon.py checks elapsed time between cycles
        - If gap > 2 minutes, treats as sleep/wake event
        - Forces immediate collection cycle on wake

      SQLite WAL mode:
        - lib/store.py init_db(): PRAGMA journal_mode=WAL, foreign_keys=ON
        - lib/health.py: check_wal_mode() verifies WAL is active, set_wal_mode() enforces it
        - checkpoint_wal(): PRAGMA wal_checkpoint(TRUNCATE) available for WAL file cleanup
        - Connection timeout: sqlite3.connect(timeout=30.0)

      Log rotation:
        - lib/observability/logging.py: configure_log_rotation() defined with RotatingFileHandler
          (max_bytes=50MB, backup_count=5)
        - BUT: daemon.py setup_logging() uses plain logging.FileHandler (line 73), NOT
          RotatingFileHandler (GAP-09-05)
        - configure_log_rotation() is defined but never called anywhere in codebase (GAP-09-05)
        - Daemon log file (daemon.log) will grow unbounded in 24h+ operation

      Memory leak patterns:
        - No explicit memory management in daemon loop (no gc.collect(), no psutil, no resource monitoring)
        - No memory usage tracking or alerting (GAP-09-06)
        - SQLite connections created per-call via get_connection() -- not pooled, should be GC'd
        - Collector objects created fresh each cycle -- no persistent state accumulation
        - Risk: long-running daemon may accumulate memory from large collector responses
          (especially gmail with 90-day lookback, asana with full workspace pull)

      Watchdog / external monitoring:
        - No systemd unit file or launchd plist for auto-restart on crash (GAP-09-07)
        - /api/health exists but returns healthy unconditionally (already GAP-08-06)
        - No external health check consumer (no cron checking /api/health)

    gaps:
      - id: "GAP-09-05"
        severity: "medium"
        description: "daemon.py uses plain FileHandler, not RotatingFileHandler. configure_log_rotation() exists in lib/observability/logging.py but is never called. Daemon log grows unbounded."
      - id: "GAP-09-06"
        severity: "low"
        description: "No memory monitoring in daemon loop -- no gc.collect(), no psutil, no memory usage tracking. Long-running operation may accumulate memory from large collector responses."
      - id: "GAP-09-07"
        severity: "low"
        description: "No systemd/launchd service definition for auto-restart on crash. Daemon relies on manual restart if process dies."

