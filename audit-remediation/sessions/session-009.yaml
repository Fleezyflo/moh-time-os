tasks_completed:
  - id: "task-01"
    name: "Verify collector coverage"
    status: "DONE with 3 GAPs"
    findings: |
      8 collectors registered in lib/collector_registry.py:
        - calendar: 60s interval, JSON output, CalendarCollector (extends BaseCollector)
        - gmail: 120s interval, JSON output, GmailCollector (extends BaseCollector)
        - tasks: 300s interval, tasks table, TasksCollector (extends BaseCollector)
        - chat: 300s interval, JSON output, ChatCollector (extends BaseCollector)
        - asana: 300s interval, tasks table, AsanaCollector (extends BaseCollector)
        - xero: 300s interval, invoices table + JSON, XeroCollector (standalone class)
        - drive: 600s interval, JSON output, mapped in get_collector_map()
        - contacts: 600s interval, JSON output, mapped in get_collector_map()

      Multi-table storage:
        - calendar: events + calendar_attendees + calendar_recurrence_rules
        - gmail: communications + gmail_participants + gmail_attachments + gmail_labels
        - chat: chat_messages + chat_reactions + chat_attachments + chat_space_metadata + chat_space_members
        - asana: tasks + asana_custom_fields + asana_subtasks + asana_stories + asana_task_dependencies + asana_attachments + asana_portfolios + asana_goals
        - xero: invoices + xero_line_items + xero_contacts + xero_credit_notes + xero_bank_transactions + xero_tax_rates
        - tasks: tasks (single table)

      Error recovery per collector:
        - BaseCollector subclasses (calendar, gmail, tasks, chat, asana): circuit breaker via resilience.py
          (failure_threshold=5, cooldown_seconds=300), retry_with_backoff (max_retries=3, base_delay=1.0,
          max_delay=60.0, exponential_base=2.0, 10% jitter). sync() wraps collect/transform/store in
          try/except with error logging.
        - XeroCollector: custom try/except in sync(), no circuit breaker, no retry_with_backoff.
        - CollectorLock (fcntl.flock) prevents concurrent collector runs.

      Orchestrator (lib/collectors/orchestrator.py):
        - _init_collectors() maps only 6 collectors: tasks, calendar, chat, gmail, asana, xero.
        - drive and contacts are NOT in orchestrator (GAP-09-01).
        - force_sync() delegates to collectors.scheduled_collect.collect_all().

      scheduled_collect.py:
        - Has all 8 collect functions: collect_calendar, collect_gmail, collect_tasks,
          collect_chat, collect_asana, collect_xero, collect_drive, collect_contacts.
        - collect_all() calls all 8 -- so force_sync pathway covers all collectors.
        - Individual orchestrator._init_collectors() pathway misses drive/contacts.

    gaps:
      - id: "GAP-09-01"
        severity: "low"
        description: "Orchestrator._init_collectors() maps only 6 of 8 collectors (missing drive, contacts). force_sync() still covers all 8 via scheduled_collect.collect_all()."
      - id: "GAP-09-02"
        severity: "medium"
        description: "XeroCollector does not extend BaseCollector -- no circuit breaker, no retry_with_backoff, no resilience.py integration"
      - id: "GAP-09-03"
        severity: "low"
        description: "all_users_runner.py exists for multi-user gmail/calendar/chat/drive collection but is not referenced by orchestrator or scheduled_collect -- unclear if actively used"

