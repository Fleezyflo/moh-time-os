id: "phase-04"
name: "Wire Notifications + Governance"
description: |
  Wire 6 modules related to notification intelligence and governance.
  Task 1: digest, notification_intelligence, attention_tracking, signal_suppression.
  Task 2: predictive_intelligence, data_governance (ComplianceReporter).

dependencies:
  - "phase-01"

track: "T1"

estimated_sessions: 2

tasks:
  - id: "task-01"
    name: "Wire notification intelligence and suppression"
    description: |
      Wire four notification-related modules:

      1. lib/notifier/digest.py (400 lines) -- DigestEngine
         Batches notifications into periodic digests. Wire into
         lib/notifier/engine.py so non-urgent notifications are batched.
         Read engine.py current send flow first.

      2. lib/intelligence/notification_intelligence.py -- NotificationIntelligence,
         NotificationDecision, NotificationBatch, FatigueState, is_work_hours(),
         select_channel(). Gates notification sends -- decides whether/how/when.
         Wire before each send in notifier/engine.py.

      3. lib/intelligence/signal_suppression.py -- SignalSuppression,
         SuppressionRecord, SignalDismissStats. Filters out signals the user
         has dismissed. Wire into signal notification flow.

      4. lib/intelligence/attention_tracking.py -- AttentionTracker,
         AttentionEvent, AttentionDebt, AttentionSummary, classify_debt_level().
         Tracks attention debt per entity. Wire into _intelligence_phase()
         after entity_memory (if phase-03 done) or after scoring.

      Add API endpoint:
      /api/v2/intelligence/attention-debt -- entities sorted by attention debt
    files:
      create: []
      modify:
        - "lib/notifier/engine.py"
        - "lib/autonomous_loop.py"
        - "api/intelligence_router.py"
      delete: []
    verification:
      - "DigestEngine integrated into NotificationEngine"
      - "NotificationIntelligence gates sends"
      - "SignalSuppression filters dismissed signals"
      - "AttentionTracker wired into intelligence phase"
      - "/api/v2/intelligence/attention-debt returns JSON"
      - "Include in command block: ruff check <changed files>"
      - "Include in command block: bandit -r <changed files>"
      - "Include in command block: python -m pytest tests/ -x"
    estimated_lines: 60
    depends_on: []

  - id: "task-02"
    name: "Wire predictive intelligence and governance"
    description: |
      Wire two substantial modules:

      1. lib/intelligence/predictive_intelligence.py -- PredictiveIntelligence,
         EarlyWarning, HealthForecast, ProactiveRecommendation, linear_forecast(),
         detect_decline_pattern(), estimate_churn_probability().
         Wire into _intelligence_phase() AFTER scoring + signals.
         Generates early warnings for entity health decline.

      2. lib/intelligence/data_governance.py (674 lines) --
         DataCatalog, DataExporter, SubjectAccessManager,
         RetentionEnforcer, ComplianceReporter.
         Wire ComplianceReporter PERIODICALLY (not every cycle, expensive).
         Add counter/timestamp check: run once per day or every N cycles.

      NOTE: lib/governance/ (separate directory) IS wired. This is the
      intelligence-layer governance that adds data classification.

      Add API endpoints:
      - /api/v2/intelligence/predictions/early-warnings
      - /api/v2/intelligence/governance/compliance-report
    files:
      create: []
      modify:
        - "lib/autonomous_loop.py"
        - "api/intelligence_router.py"
      delete: []
    verification:
      - "Early warnings generated for declining entities"
      - "ComplianceReporter runs periodically, not every cycle"
      - "Both API endpoints return valid JSON"
      - "Include in command block: ruff check <changed files>"
      - "Include in command block: bandit -r <changed files>"
      - "Include in command block: python -m pytest tests/ -x"
    estimated_lines: 40
    depends_on: ["task-01"]

completion_criteria:
  - "All 6 modules wired"
  - "Notification system has intelligent batching, fatigue, suppression"
  - "Predictive warnings generated"
  - "Compliance report available via API"
  - "PR merged to main, CI green"
