id: "phase-06"
name: "Error Masking Audit"
description: |
  Audit return {}/[] and silent except patterns across the codebase.
  Classify each as legitimate or error-masking, fix the masking ones.

dependencies:
  - "phase-02"
  - "phase-03"
  - "phase-04"
  - "phase-05"

track: "T1"

estimated_sessions: 1

tasks:
  - id: "task-01"
    name: "Audit and fix return {}/[] error-masking patterns"
    description: |
      Investigate all `return {}` and `return []` across lib/, api/, engine/.
      Classify each: error-masking (in except blocks, hiding failures) vs
      legitimate (no-data defaults, accumulators). Fix the masking ones --
      add logging, raise, or return typed errors. Also catch any silent
      `except: pass` or `except Exception: pass`.
    files:
      create: []
      modify: []
      delete: []
    verification:
      - "Zero return {}/[] in except blocks without logging"
      - "No except: pass or except Exception: pass anywhere"
    estimated_lines: 150
    depends_on: []

completion_criteria:
  - "Every error-masking return has logging or raises"
  - "No silent exception swallowing"
  - "PR merged to main, CI green"
