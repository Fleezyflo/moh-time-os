    name: "Verify UI completeness"
    description: |
      Spec: IX-3.1 to IX-6.1 (tasks/TASK_P3_23_VERIFY_UI_COMPLETENESS.md)
      Investigate all registered routes -- confirm each has a functional
      page (not a stub), makes valid API calls, and follows existing
      UI patterns.
    files:
      create: []
      modify: []
      delete: []
    verification:
      - "All routes have functional pages; stubs identified as GAP"
    estimated_lines: 0
    depends_on: []

  - id: "task-02"
    name: "Verify view reconciliation"
    description: |
      Spec: VR-1.1 to VR-5.1 (tasks/TASK_P3_24_VERIFY_VIEW_RECONCILIATION.md)
      Confirm old scored views fully replaced by detection system views.
      No duplicate or competing view components.
    files:
      create: []
      modify: []
      delete: []
    verification:
      - "Single active view system confirmed; no competing views"
    estimated_lines: 0
    depends_on: []

  - id: "task-03"
    name: "Verify V4/V5 consolidation"
    description: |
      Spec: IE-5.1 to IE-7.1 (tasks/TASK_P3_25_VERIFY_V4V5_CONSOLIDATION.md)
      Confirm V5 is the sole active intelligence engine. No V4 modules
      imported or running in parallel.
    files:
      create: []
      modify: []
      delete: []
    verification:
      - "V5 confirmed sole engine; no V4 imports in active code"
    estimated_lines: 0
    depends_on: []

  - id: "task-04"
    name: "Verify synthesis validation"
    description: |
      Spec: ID-6.1 (tasks/TASK_P3_26_VERIFY_SYNTHESIS_VALIDATION.md)
