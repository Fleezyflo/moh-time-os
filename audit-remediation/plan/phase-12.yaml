id: "phase-12"
name: "Verify UI + Architecture"
description: |
  Verification-only phase. Partially blocked on phase-02 (deepening wiring).
  Validates: UI completeness, view reconciliation, V4/V5 consolidation,
  synthesis validation (blocked), debug/observability.

dependencies:
  - "phase-02"

track: "T2"

estimated_sessions: 2

tasks:
  - id: "task-01"
    name: "Verify UI completeness"
    description: |
      Original spec: IX-3.1 to IX-6.1 (tasks/TASK_P3_23_VERIFY_UI_COMPLETENESS.md)
      Check all UI pages are functional (not stubs).
      NOTE from audit: DataQuality.tsx (72 lines), Notifications.tsx (82 lines),
      Approvals.tsx (92 lines) were verified as FUNCTIONAL -- they use real
      hooks, components, and API calls. Verify remaining pages similarly.
    files:
      create: []
      modify: []
      delete: []
    verification:
      - "All registered routes have functional pages"
      - "No stub pages (empty or placeholder content)"
      - "All pages make valid API calls"
      - "tsc --noEmit passes on all UI files"
    estimated_lines: 0
    depends_on: []

  - id: "task-02"
    name: "Verify view reconciliation"
    description: |
      Original spec: VR-1.1 to VR-5.1 (tasks/TASK_P3_24_VERIFY_VIEW_RECONCILIATION.md)
      Check: old views fully replaced by detection system views.
      No duplicate/competing views. Three-tab scored layout removed.
      Single-view detection design is active.
    files:
      create: []
      modify: []
      delete: []
    verification:
      - "Old scored view components removed or deprecated"
      - "Detection system view is the active command center"
      - "No conflicting view imports"
    estimated_lines: 0
    depends_on: []

  - id: "task-03"
    name: "Verify V4/V5 consolidation"
    description: |
      Original spec: IE-5.1, IE-7.1 (tasks/TASK_P3_25_VERIFY_V4V5_CONSOLIDATION.md)
      Check: V4 intelligence modules fully migrated to V5.
      No duplicate V4/V5 code running in parallel.
      V5 is the active intelligence engine.
    files:
      create: []
      modify: []
      delete: []
    verification:
      - "V4 modules not imported in active code"
      - "V5 is the sole intelligence engine"
      - "No V4/V5 duplication"
    estimated_lines: 0
    depends_on: []

  - id: "task-04"
    name: "Verify synthesis validation"
    description: |
      Original spec: ID-6.1 (tasks/TASK_P3_26_VERIFY_SYNTHESIS_VALIDATION.md)
      BLOCKED on phase-02 (intelligence deepening wiring).
      After deepening modules wired, verify:
      entity_profile synthesis combines scores, signals, patterns correctly.
    files:
      create: []
      modify: []
      delete: []
    verification:
      - "Entity profiles synthesize all intelligence sources"
      - "No missing data in synthesized profiles"
      - "Profile API returns complete data"
    estimated_lines: 0
    depends_on: []

  - id: "task-05"
    name: "Verify debug and observability"
    description: |
      Original spec: IO-4.1, IO-5.1 (tasks/TASK_P3_27_VERIFY_DEBUG_OBSERVABILITY.md)
      Verify: debug mode exists and is useful, observability covers
      critical paths, metrics/tracing/health endpoints functional.
    files:
      create: []
      modify: []
      delete: []
    verification:
      - "Debug mode toggleable and useful"
      - "Observability covers intelligence pipeline"
      - "Health endpoint reports meaningful status"
      - "Metrics collected for critical operations"
    estimated_lines: 0
    depends_on: []

completion_criteria:
  - "All 5 verification tasks produce DONE or GAP report"
  - "Gaps filed as new tasks"
  - "Results documented in session record"
