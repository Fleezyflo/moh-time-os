      After wiring, verify entity_profile synthesis combines all sources.
    files:
      create: []
      modify: []
      delete: []
    verification:
      - "Entity profile synthesis verified against all intelligence sources"
    estimated_lines: 0
    depends_on: []

  - id: "task-05"
    name: "Verify debug and observability"
    description: |
      Spec: IO-4.1 to IO-5.1 (tasks/TASK_P3_27_VERIFY_DEBUG_OBSERVABILITY.md)
      Investigate: debug mode, observability coverage, metrics collection,
