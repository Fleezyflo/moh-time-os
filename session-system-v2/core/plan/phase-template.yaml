# Phase Specification Template
# Copy this file as phase-NN.yaml and fill in the details.
#
# Design principles:
# - Each task is one session's worth of work (or less)
# - Each task has concrete verification criteria
# - Each task lists exact files it will touch
# - Tasks are ordered by dependency within the phase

id: "phase-NN"
name: "Phase Name"
description: |
  What this phase accomplishes and why it matters.
  What the system looks like before and after this phase.

dependencies:
  - "phase-XX"  # Must be complete before this phase starts

track: "T1"     # Logical grouping for parallel work

estimated_sessions: 2

# Tasks within this phase
# Each task is a discrete unit of work that can be verified independently.
# A session should complete 1-3 tasks depending on complexity.
tasks:
  - id: "task-01"
    name: "Short description of the task"
    description: |
      Detailed description of what this task does.
      Include the approach, not just the outcome.
    files:
      create:
        - "path/to/new/file.ts"
      modify:
        - "path/to/existing/file.ts"
      delete: []
    verification:
      - "Description of what to check"
      - "Command to run or condition to verify"
      - "Expected output or state"
    estimated_lines: 50  # rough scope indicator
    depends_on: []       # task IDs within this phase

  - id: "task-02"
    name: "Another task"
    description: |
      ...
    files:
      create: []
      modify:
        - "path/to/file.ts"
    verification:
      - "..."
    estimated_lines: 30
    depends_on: ["task-01"]

# Phase-level verification
# These checks must pass before the phase can be marked complete.
completion_criteria:
  - "All tasks marked complete in state.json"
  - "All PRs merged to main"
  - "CI green on main after merge"
  - "Phase-specific verification: ..."
