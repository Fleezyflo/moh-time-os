# Plan Index
# This file is the master registry of all phases.
# It must stay in sync with state.json (enforced by check_state.py).
#
# To add a new phase:
# 1. Add entry here with status: pending
# 2. Create plan/phase-NN.yaml with detailed spec
# 3. Add to state.json phases map
# 4. Run check_state.py to verify consistency

project: "{{PROJECT_NAME}}"

