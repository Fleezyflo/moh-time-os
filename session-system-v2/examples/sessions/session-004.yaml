# Issues discovered during this session
# Things that need attention but are outside this session's scope
discovered:
  - id: "BL-001"
    description: "Password complexity validation missing"
    severity: high
    context: |
      Current implementation accepts any non-empty password.
      Production systems should require: minimum 12 chars, uppercase, digit, special char.
      This should be enforced in register endpoint and documented in API spec.
      Recommended: move validation to backend/lib/auth.py as validate_password_strength().
    files: [backend/routes/auth.py]

  - id: "BL-002"
    description: "JWT token expiry and refresh strategy"
    severity: high
    context: |
      T4 (JWT generation) requires decision: short-lived access tokens (15 min) + refresh tokens (7 day),
      or long-lived tokens (24 hr)?
      Short-lived is more secure but complex (requires frontend refresh logic + refresh endpoint).
      Long-lived is simpler but worse for token compromise.
      This blocks T4 implementation and affects T5 (middleware) and later frontend code.
      Recommendation: go short-lived (industry standard for auth, especially if stored in localStorage).
    files: [backend/lib/tokens.py]

# Rules or patterns learned
lessons:
  - rule: "Test database setup with fixtures"
    severity: medium
    context: |
      Using pytest fixtures (conftest.py) for test DB setup/teardown is essential.
      This session's integration tests used a shared test database that persists across test runs.
      Recommendation: add a fixture that creates/drops schema before/after each test for isolation.
      Learning from: test_register_duplicate_username test was unreliable until fixture was fixed.

  - rule: "Parameterized queries prevent SQL injection automatically"
    severity: medium
    context: |
      SQLAlchemy ORM handles parameterization automatically. No risk of SQL injection from user input.
      This session required zero `# noqa` or `# type: ignore` comments because the design is sound.
      Lesson: use ORM for queries, never f-string SQL, never raw SQL strings.

  - rule: "Argon2 is slower than MD5, but worth it"
    severity: low
    context: |
      Argon2 hashing is slow (~100ms per hash on this hardware).
      This is deliberate: slows down brute-force attacks.
      Production concern: login endpoint will take 100ms+ per request.
      Solution: consider async hashing or a dedicated auth service in future phases.
      For now, this is acceptable for TaskFlow's scale.

